# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# backend.yml — CI/CD Pipeline pour le backend Spring Boot
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Pipeline en 3 jobs :
#   1. test      : exécute les tests unitaires et d'intégration
#   2. build     : construit l'image Docker multi-stage
#   3. deploy    : déploie sur Render via webhook
#
# Déclencheur : push sur main avec modifications dans backend/

name: Backend CI/CD

on:
  push:
    branches: [main]
    # Exécute le pipeline uniquement si des fichiers backend ont changé
    # Économise des minutes CI/CD (limité sur GitHub free tier)
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

# Permissions minimales pour le token GITHUB_TOKEN
permissions:
  contents: read

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 1 : Tests unitaires et d'intégration
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      # Base de données PostgreSQL éphémère pour les tests d'intégration
      # Ce conteneur est créé et détruit pour chaque exécution du pipeline
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ironpath_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        # Health check pour attendre que PostgreSQL soit prêt
        options: >-
          --health-cmd="pg_isready -U test -d ironpath_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # Récupère le code source du repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Installe Java 21 (Temurin = distribution gratuite et supportée)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Cache Gradle : évite de re-télécharger les dépendances à chaque build
      # Le cache est basé sur le hash de build.gradle.kts
      # Gain moyen : 30-60 secondes par pipeline
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Rend le script Gradle Wrapper exécutable
      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x gradlew
        working-directory: backend

      # Exécute les tests avec les variables d'environnement pour le PostgreSQL de test
      - name: Run tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ironpath_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          JWT_SECRET: ci-test-secret-must-be-at-least-64-characters-long-for-hmac-sha256-algorithm
        run: ./gradlew test

      # Publie les résultats de test au format JUnit (visible dans l'onglet "Checks" de GitHub)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/build/reports/tests/

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 2 : Build de l'image Docker
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    # Ne build que si les tests passent
    needs: test
    # Ne build que sur main (pas sur les PRs)
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Vérifie que le Dockerfile build correctement
      # Le tag "latest" est utilisé pour le déploiement Render
      - name: Build Docker image
        run: docker build -t ironpath-api:latest ./backend

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 3 : Déploiement sur Render
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      # Déclenche un déploiement Render via son API webhook
      # Render détecte le push, pull le code, et rebuild le Docker
      # Le webhook est un POST sans body, l'URL est secrète
      #
      # Configuration Render :
      # 1. Créer un Deploy Hook dans les settings du service Render
      # 2. Copier l'URL du webhook
      # 3. L'ajouter comme secret GitHub : RENDER_DEPLOY_HOOK_URL
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK_URL"
            echo "✅ Deployment triggered on Render"
          else
            echo "⚠️ RENDER_DEPLOY_HOOK_URL not set — skipping deploy"
          fi
