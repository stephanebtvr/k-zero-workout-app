# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# mobile.yml — CI/CD Pipeline pour l'app mobile React Native / Expo
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Pipeline en 3 jobs :
#   1. lint  : vérifie le code (ESLint + TypeScript)
#   2. test  : exécute les tests Jest
#   3. publish : publie une mise à jour OTA (Over-The-Air) via EAS Update
#
# Différence OTA vs Store Release :
# - OTA (EAS Update) : met à jour le code JS/assets sans passer par les stores
#   → Instantané, idéal pour les corrections et les démos
#   → Limité aux changements JS (pas de nouveau module natif)
# - Store Release (EAS Build) : compile une nouvelle version native
#   → Nécessaire si on ajoute un package natif (ex: nouveau SDK)
#   → Passe par l'App Store / Play Store (review + délai)
#
# Pour le MVP IronPath, on utilise uniquement OTA via EAS Update.

name: Mobile CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'

permissions:
  contents: read

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 1 : Lint (qualité du code)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache npm pour accélérer l'installation
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: ${{ runner.os }}-mobile-npm-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-mobile-npm-

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      # ESLint + TypeScript : vérifie la qualité et le typage du code
      - name: Run linter
        working-directory: mobile
        run: npm run lint

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 2 : Tests Jest
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: ${{ runner.os }}-mobile-npm-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-mobile-npm-

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      # Jest : tests unitaires des composants, hooks, et stores
      - name: Run tests
        working-directory: mobile
        run: npm test -- --ci --coverage

      # Upload du rapport de couverture de code
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 3 : Publication OTA via EAS Update
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  publish:
    name: Expo Publish (OTA)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: ${{ runner.os }}-mobile-npm-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-mobile-npm-

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      # Installation d'EAS CLI (Expo Application Services)
      # EAS gère les builds et les mises à jour OTA
      - name: Setup EAS CLI
        run: npm install -g eas-cli

      # Publication OTA : met à jour l'app sans passer par les stores
      # --branch production : canal de distribution pour les utilisateurs
      # Les utilisateurs avec Expo Go verront la mise à jour au prochain lancement
      #
      # Secret requis : EXPO_TOKEN (obtenu sur expo.dev → Access Tokens)
      - name: Publish OTA update
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            eas update --branch production --message "Auto-deploy from CI/CD" --non-interactive
            echo "✅ OTA update published via EAS"
          else
            echo "⚠️ EXPO_TOKEN not set — skipping publish"
          fi
